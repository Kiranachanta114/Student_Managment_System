<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Students</title>
</head>
<body class="container mt-4">

<h1 class="mb-3">
    <a href="/s/" class="text-decoration-none text-dark">Student List</a>
</h1>

    <a href="/a/" class="btn btn-primary mb-3">Add Student</a>
    <br>
    <form method="GET" action="/s/">
    <input type="text" name="q" placeholder="Search student">
    <button type="submit">Search</button>
    </form>

<br>

    <table class="table table-bordered table-striped">


        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Email</th>
            <th>Course</th>
            <th>Action</th>

        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.roll_no }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>
      <td>
    <a href="/edit/{{ student.id }}/" class="btn btn-warning btn-sm">Edit</a>
    <a href="/delete/{{ student.id }}/" class="btn btn-danger btn-sm">Delete</a>
</td>



        </tr>
        {% endfor %}
    </table>

</body>
</html>
